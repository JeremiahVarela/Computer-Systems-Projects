<!doctype html>
<html lang="en">
  <head>
    <title>Example of Rounded Corners Box Style</title>
    <link rel="stylesheet" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-image: linear-gradient(120deg, #af7575, #95bec1, #4e5992);
        height: 100vh;
      }

      .box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50%;
        background: #5339b1;
        border: 2px solid #41a35a;
        border-radius: 20px;
        box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.05);
      }
      .box h1 {
        text-align: center;
        padding: 20px 0;
        background: linear-gradient(100deg, #89ccff, #99ccff);
        border-bottom: 1px solid silver;
      }
      .top {
        list-style-type: none;
        align-items: center;
        display: flex;
        justify-content: space-around;
      }
      ul.top > li a {
        text-decoration: none;
        background-image: linear-gradient(120deg, #44ffff, #ff1133, #11ff55);
        color: #ffffff;
        padding: 5px 10px;
        border-radius: 10px;
      }
      .nav1 {
        border-radius: 10px;
        padding: 2px;
        background-image: linear-gradient(120deg, #ffdd23, #ff1133, #11ff55);
      }
      ul.top > li a:hover {
        background-image: linear-gradient(#44ffff, #ff1133, #11ff55);

        cursor: pointer;
      }
      .login-button {
        color: #fff;
        font-weight: bold;
        border: none;
        padding: 5px 10px;
        background-image: linear-gradient(120deg, #ffdd23, #ff1133, #11ff55);
        border-radius: 10px;
      }
      .login-button:hover {
        background-image: linear-gradient(#ffdd23, #ff1133, #11ff55);

        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <nav class="nav1">
      <ul class="top">
        <li><a href="#">Home</a></li>
        <li><a href="abt.html">About Us</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Our Team</a></li>
        <li><a href="#">Contact</a></li>

        <li><button class="login-button">Login</button></li>
      </ul>
    </nav>
    <div class="box">
      <h1></h1>
    </div>
    <div>&nbsp;</div>
  </body>
</html>
