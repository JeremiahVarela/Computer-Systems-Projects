<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tailwind CSS assignment</title>

        <!-- Tailwind CSS CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center gap-10 p-10">

    <!-- Part1: Basic 2x2 Grid Layout -->
     <div class="grid grid-cols-2 gap-4 w-64">
        <div class="bg-red-400 text-white text-center p-8 rounded">1</div>
        <div class="bg-blue-400 text-white text-center p-8 rounded">2</div>
        <div class="bg-green-400 text-white text-center p-8 rounded">3</div>
        <div class="bg-yellow-400 text-white text-center p-8 rounded">4</div>
     </div>
     <!-- Part2:Gradient colored button using tailwind css-->
      <button class="bg-gradient-to-r from-blue-500 to-pink-500 hover:from-pink-500 hover:to-blue-500 text-white py-2 px-4 shadow-md rounded">
        click me
      </button>
    </body>
</html>
